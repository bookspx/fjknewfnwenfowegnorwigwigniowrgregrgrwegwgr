name: XX

on:
  workflow_dispatch:
    inputs:
      google_drive_file_id:
        description: 'GG'
        required: true
      shopee_url:
        description: 'RMTP'
        required: true
      shopee_key:
        description: 'KK'
        required: true

jobs:
  live_stream:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Streaming Engine
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip
          python3 -m pip install --user gdown
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: DLP
        run: |

          gdown "https://drive.google.com/uc?id=${{ github.event.inputs.google_drive_file_id }}" -O live_video.mp4

          echo "Download completed."
          echo "File information:"
          ls -lh live_video.mp4
          file live_video.mp4

      - name: VV
        run: |

          ffprobe -v error -show_format -show_streams live_video.mp4

          echo "Video verification successful."

      - name: SPX
        run: |

          RTMP_URL="${{ github.event.inputs.shopee_url }}"
          RTMP_KEY="${{ github.event.inputs.shopee_key }}"

          RTMP_URL="${RTMP_URL%/}"

          ffmpeg -re -stream_loop -1 -i live_video.mp4 \
            -c:v libx264 \
            -preset veryfast \
            -b:v 2500k \
            -maxrate 2500k \
            -bufsize 5000k \
            -pix_fmt yuv420p \
            -g 50 \
            -c:a aac \
            -b:a 128k \
            -ar 44100 \
            -f flv "$RTMP_URL/$RTMP_KEY"
