name: Shopee Cloud Live Stream (YouTube Feed)
on:
  workflow_dispatch:
    inputs:
      shopee_url:
        description: 'Paste Shopee RTMP URL'
        required: true
      shopee_key:
        description: 'Paste Shopee Stream Key'
        required: true

jobs:
  live_stream:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Streaming Engine & YouTube Downloader
      run: |
        sudo apt-get update
        sudo apt-get install ffmpeg python3-pip python3-venv -y
        # FIXED: Using secure python environment to safely install yt-dlp
        python3 -m venv venv
        source venv/bin/activate
        pip install --upgrade pip
        pip install yt-dlp

    - name: Stream Directly From YouTube to Shopee
      run: |
        source venv/bin/activate
        YOUTUBE_LINK="https://www.youtube.com/watch?v=8I-__ecBSxY"
        
        # Streams directly from YouTube straight into FFmpeg data pipeline
        yt-dlp --no-check-certificates --no-warnings -f "bv*[ext=mp4]+ba[ext=m4a]/b[ext=mp4]" -o - "$YOUTUBE_LINK" | \
        ffmpeg -i pipe:0 -re -stream_loop -1 -c:v libx264 -preset veryfast -b:v 2500k -maxrate 2500k -bufsize 5000k -pix_fmt yuv420p -g 50 -c:a aac -b:a 128k -ar 44100 -f flv "${{ github.event.inputs.shopee_url }}/${{ github.event.inputs.shopee_key }}"
