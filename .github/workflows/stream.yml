name: Shopee Cloud Live Stream (Google Drive)
on:
  workflow_dispatch:
    inputs:
      shopee_url:
        description: 'Paste Shopee RTMP URL'
        required: true
      shopee_key:
        description: 'Paste Shopee Stream Key'
        required: true

jobs:
  live_stream:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Streaming Engine
      run: |
        sudo apt-get update
        sudo apt-get install ffmpeg aria2 -y

    - name: Download From Google Drive
      run: |
        # FIXED: Direct link with your exact File ID hardcoded cleanly into the downloader
        aria2c -x 16 -s 16 -k 1M --check-certificate=false "https://google.com" -o live_video.mp4

    - name: Stream File to Shopee
      run: |
        # Streams your 4-hour video smoothly on an infinite loop to Shopee
        ffmpeg -re -stream_loop -1 -i live_video.mp4 -c:v libx264 -preset veryfast -b:v 2500k -maxrate 2500k -bufsize 5000k -pix_fmt yuv420p -g 50 -c:a aac -b:a 128k -ar 44100 -f flv "${{ github.event.inputs.shopee_url }}/${{ github.event.inputs.shopee_key }}"
